apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: app-ingress
  namespace: my-gitops-app
  annotations:
    # Tells the cluster to use the Nginx Ingress Controller to manage this rule
    kubernetes.io/ingress.class: "nginx"
spec:
  rules:
  - host: my-observability-app.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-service
            port:
              number: 80              # Routes directly to your frontend Nginx port